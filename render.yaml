services:
  - type: web
    name: telegram-ticket-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "bot:flask_app" --bind "0.0.0.0:$PORT" --workers 1 --threads 4 --timeout 60
    healthCheckPath: /healthz
    envVars:
      - key: BOT_TOKEN
        sync: false          # токен бота от @BotFather
      - key: RENDER_URL
        sync: false          # публичный URL сервиса, напр. https://my-bot.onrender.com

      # ── GitHub API (для персистентного whitelist) ─────────────────────────
      # Получить токен: GitHub → Settings → Developer settings
      #   → Personal access tokens → Tokens (classic)
      #   → Generate new token → отметь scope "repo" → Generate
      - key: GITHUB_TOKEN
        sync: false          # ghp_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      - key: GITHUB_OWNER
        sync: false          # твой GitHub username, напр. maksleny
      - key: GITHUB_REPO
        sync: false          # название репозитория, напр. t-ticket
      - key: GITHUB_BRANCH
        value: main          # ветка (менять не нужно если используешь main)

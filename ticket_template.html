<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Билет</title>
  <style>
    body { margin:0; padding:0; font-family:Arial,Helvetica,sans-serif; background:#f7f7f7; color:#111; }
    .ticket { max-width:820px; margin:0 auto; padding:24px; background:#fff; border-radius:20px; box-shadow:0 12px 30px rgba(0,0,0,0.08); }
    .header { text-align:center; margin-bottom:18px; }
    .header h1 { margin:0; font-size:28px; }
    .row { display:flex; justify-content:space-between; gap:12px; margin:14px 0; }
    .card { flex:1; padding:16px; border-radius:14px; background:#f4f6fb; }
    .label { display:block; color:#667; font-size:12px; margin-bottom:6px; text-transform:uppercase; letter-spacing:0.08em; }
    .value { font-size:20px; font-weight:700; }
    .footer { margin-top:24px; text-align:center; color:#555; }
    .badge { display:inline-block; padding:6px 14px; border-radius:999px; background:#e6f4ff; color:#0d60b8; font-size:13px; }
  </style>
</head>
<body>
  <div class="ticket">
    <div class="header">
      <div class="badge">Уведомление об оплате проезда</div>
      <h1>{{TRANSPORT_LABEL}} №{{ROUTE}}</h1>
    </div>
    <div class="row">
      <div class="card">
        <span class="label">Транспорт</span>
        <span class="value">№{{VEHICLE}}</span>
      </div>
      <div class="card">
        <span class="label">Оплата</span>
        <span class="value">{{DATETIME}}</span>
      </div>
    </div>
    <div class="row">
      <div class="card">
        <span class="label">Таймер</span>
        <span class="value">{{ELAPSED}}</span>
      </div>
      <div class="card">
        <span class="label">Цена</span>
        <span class="value">{{PRICE}} руб.</span>
      </div>
    </div>
    <div class="row">
      <div class="card" style="flex:2;">
        <span class="label">Серийный номер</span>
        <span class="value">{{TICKET_SERIAL}}</span>
      </div>
      <div class="card" style="flex:1;">
        <span class="label">Номер билета</span>
        <span class="value">{{TICKET_NUMBER}}</span>
      </div>
    </div>
    <div class="footer">Пожалуйста, предъявите экран водителю при проверке.</div>
  </div>
</body>
</html>
